[defaults]
inventory = inventory.ini
host_key_checking = False
remote_user = root
private_key_file = ~/.ssh/id_ed25519


all:
  hosts:
%{ for i in vms ~}
    ${i.name}:
      ansible_host: ${i.network_interface.0.nat_ip_address != "" ? i.network_interface.0.nat_ip_address : i.network_interface.0.ip_address}
      ansible_user: ubuntu
%{ if i.network_interface.0.nat_ip_address == "" ~}
      ansible_ssh_common_args: '-o ProxyJump=ubuntu@${bastion_ip}'
%{ endif ~}
%{ endfor ~}

  vars:
    ansible_ssh_private_key_file: ~/.ssh/id_ed25519
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no'
